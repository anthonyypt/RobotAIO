name: Announce release to Discord

# Fires whenever you PUBLISH a GitHub release (draft → Publish). It posts a formatted
# "new version — update now" message to a Discord channel via a webhook.
#
# One-time setup:
#   1. In Discord: Server Settings → Integrations → Webhooks → New Webhook → pick the
#      announcements channel → Copy Webhook URL.
#   2. In GitHub: repo → Settings → Secrets and variables → Actions → New repository
#      secret → name it DISCORD_RELEASE_WEBHOOK, paste the webhook URL.
#   3. Commit this file. Next time you publish a release, the message goes out.
on:
  release:
    types: [published]

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          TAG: ${{ github.event.release.tag_name }}
          NOTES: ${{ github.event.release.body }}
          URL: ${{ github.event.release.html_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK:-}" ]; then
            echo "DISCORD_RELEASE_WEBHOOK secret is not set — skipping."
            exit 0
          fi

          ICON="https://raw.githubusercontent.com/${REPO}/main/build/icon/robotaio.png"
          DOWNLOAD="https://github.com/${REPO}/releases/latest/download/RobotAIO-Setup.exe"

          # Trim the changelog to fit Discord's embed-description limit (4096 chars),
          # then append the update instructions.
          NOTES_TRIM=$(printf '%s' "${NOTES:-}" | head -c 3500)
          DESC=$(printf '%s\n\n**How to update:** open RobotAIO — it auto-updates on launch — or download the installer below.' "$NOTES_TRIM")

          # Build the payload safely with jq (handles quotes/newlines in the changelog).
          jq -n \
            --arg tag  "$TAG" \
            --arg desc "$DESC" \
            --arg url  "$URL" \
            --arg dl   "$DOWNLOAD" \
            --arg icon "$ICON" \
            '{
              username: "RobotAIO",
              avatar_url: $icon,
              content: ("🚀 **RobotAIO " + $tag + " is out — please update!**"),
              allowed_mentions: { parse: [] },
              embeds: [{
                title: ("RobotAIO " + $tag),
                description: $desc,
                url: $url,
                color: 16734120,
                thumbnail: { url: $icon },
                fields: [
                  { name: "Version",  value: $tag, inline: true },
                  { name: "Download", value: ("[RobotAIO-Setup.exe](" + $dl + ")"), inline: true }
                ],
                footer: { text: "RobotAIO · walmart.ca", icon_url: $icon }
              }]
            }' > payload.json

          curl -sS -X POST -H "Content-Type: application/json" -d @payload.json "$WEBHOOK"
